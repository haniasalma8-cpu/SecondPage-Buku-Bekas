<!-- DETAIL PRODUK -->
<section class="detail-wrapper">

  <div class="detail-card">
    
    <button onclick="history.back()" class="btn-back">✖</button>

    <div class="detail-img">
      <img id="mainImg" class="img1">
      <div class="thumbs">
        <img id="thumb1" class="img1">
        <img id="thumb2" class="img2">
      </div>
    </div>

<div class="detail-info">
  <h1 id="judul"></h1>
  <p class="harga" id="harga"></p>
  <p><b>Penulis :</b> <span id="penulis"></span></p>
  <p><b>Kondisi :</b> <span id="kondisi"></span></p>

  <div class="bottom-area">
    <p class="info-wa">
      Klik tombol di bawah untuk langsung pesan via WhatsApp 📲
    </p>

    <div class="button-group">
      <a id="waLink" class="btn">Beli via WhatsApp</a>
      <button onclick="tambahKeranjang()" class="btn">🛒</button>
    </div>
  </div>
</div>
  

  </div>

</section>
